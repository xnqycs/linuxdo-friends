name: Build extension package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package Chrome extension
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' }}

    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match v1.0.0 style: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package zip
        run: npm run package-extension -- --name "linuxdo-friends-${GITHUB_REF_NAME}.zip"

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: linuxdo-friends-${{ github.ref_name }}
          path: packages/linuxdo-friends-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: packages/linuxdo-friends-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
